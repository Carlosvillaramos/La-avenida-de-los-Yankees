<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Avenida de los Yankees | El Corazón del Bronx</title>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* VARIABLES DE COLOR (Aquí está el Azul Yankees oficial) */
    :root {
      --yankee-blue: #003087;
      --yankee-white: #ffffff;
      --yankee-black: #000000;
      --yankee-gray: #f8f9fa;
      --yankee-dark-blue: #001f5c; 
      --accent-yellow: #fdb813;
    }

    /* ANIMACIÓN DEL PUNTO DE RADIO */
    .pulse-dot {
      height: 12px; width: 12px;
      background-color: #ff0000;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--yankee-white);
      /* Tus famosas rayas de fondo */
      background-image: linear-gradient(90deg, transparent 95%, rgba(0, 48, 135, 0.05) 95%);
      background-size: 35px 100%;
      color: #333;
    }

    header {
      background-color: var(--yankee-blue);
      color: white;
      padding: 30px;
      text-align: center;
      border-bottom: 6px solid var(--yankee-black);
    }

    .logo-container img {
      max-width: 150px;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    nav {
      background: var(--yankee-black);
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; }

    /* SECCIÓN DE RADIO */
    .radio-bar {
      background: var(--yankee-dark-blue);
      color: white;
      padding: 15px;
      border-bottom: 4px solid var(--accent-yellow);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* CONTENEDOR DE NOTICIAS (Donde Netlify pondrá tus artículos) */
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .noticia-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      margin-bottom: 30px;
      border: 1px solid #ddd;
    }

    .noticia-card img { width: 100%; height: auto; border-bottom: 4px solid var(--yankee-blue); }
    .noticia-content { padding: 20px; }
    .noticia-content h2 { color: var(--yankee-blue); margin-bottom: 10px; }

    footer {
      background: var(--yankee-black);
      color: white;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="La-Avenida-de-los-Yankees-logo.png" alt="Logo">
    </div>
    <h1>LA AVENIDA DE LOS YANKEES</h1>
    <p>EL CORAZÓN DEL BRONX EN ESPAÑOL</p>
  </header>

  <nav>
    <a href="/">Inicio</a>
    <a href="/admin">Escribir Noticia</a>
  </nav>

  <div class="radio-bar">
    <div style="display: flex; align-items: center; gap: 8px;">
      <span class="pulse-dot"></span>
      <strong>RADIO EN VIVO</strong>
    </div>
    <audio controls style="height: 30px;">
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
  </div>

  <main class="container">
    <div id="noticias-lista"></div>
  </main>

  <footer>
    <p>&copy; 2026 La Avenida de los Yankees - Creado por Carlos Villar</p>
  </footer>

  <script>
    // Script básico para mostrar las noticias (luego lo haremos más pro)
    // Por ahora esto mantendrá la estructura limpia.
  </script>
</body>
</html>
