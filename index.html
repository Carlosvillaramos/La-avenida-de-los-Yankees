<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Avenida de los Yankees | Noticias del Bronx</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Unos retoques rápidos para que las noticias se vean geniales */
        #noticias-lista {
            display: grid;
            gap: 20px;
            padding: 20px;
        }
        .noticia-card {
            border: 2px solid #003087;
            border-radius: 10px;
            padding: 20px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-leer {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #003087;
            color: white !important;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-leer:hover {
            background-color: #E4002C;
        }
    </style>
</head>
<body>

    <header style="text-align: center; padding: 20px; background-color: #003087; color: white;">
        <h1>LA AVENIDA DE LOS YANKEES</h1>
        <p>El pulso de los Bombarderos del Bronx</p>
    </header>

    <main>
        <section id="noticias-seccion">
            <h2 style="text-align: center; margin-top: 30px;">Últimas Noticias</h2>
            
            <div id="noticias-lista">
                <p style="text-align: center;">Calentando el brazo... (Cargando noticias)</p>
            </div>
        </section>
    </main>

    <script>
      async function cargarNoticiasYankees() {
        const lista = document.getElementById('noticias-lista');
        
        try {
          // 1. Conectamos con tu repositorio en GitHub
          const res = await fetch('https://api.github.com/repos/carlosvillaramos/La-avenida-de-los-Yankees/contents/content/blog');
          
          if (!res.ok) throw new Error("No se pudo conectar con el servidor de noticias");
          
          const archivos = await res.json();

          // Limpiamos el mensaje de "Cargando"
          lista.innerHTML = '';

          // 2. Procesamos cada archivo (los más nuevos primero)
          archivos.reverse().forEach(archivo => {
            if (archivo.name.endsWith('.md')) {
              // Formateamos el título: quitamos fecha y guiones
              const nombreSinExtension = archivo.name.replace('.md', '');
              // Quitamos los primeros 11 caracteres (la fecha YYYY-MM-DD-)
              const tituloLimpio = nombreSinExtension.substring(11).replace(/-/g, ' ');

              const article = document.createElement('article');
              article.className = 'noticia-card';
              article.innerHTML = `
                <div class="noticia-content">
                  <h3 style="text-transform: capitalize; color: #003087; margin-top: 0;">${tituloLimpio}</h3>
                  <p>Análisis exclusivo y noticias recientes directamente desde el diamante.</p>
                  <a href="https://github.com/carlosvillaramos/La-avenida-de-los-Yankees/blob/main/content/blog/${archivo.name}" 
                     target="_blank" 
                     class="btn-leer">
                     Leer noticia completa
                  </a>
                </div>
              `;
              lista.appendChild(article);
            }
          });

          if (lista.innerHTML === '') {
            lista.innerHTML = '<p style="text-align: center;">Aún no hay noticias publicadas. ¡Vuelve pronto!</p>';
          }

        } catch (error) {
          console.error("Error en el lineup:", error);
          lista.innerHTML = '<p style="text-align: center; color: red;">Error al cargar las noticias. Revisa la conexión.</p>';
        }
      }

      // ¡Play ball! Ejecutamos la función
      cargarNoticiasYankees();
    </script>

    <footer style="text-align: center; padding: 20px; margin-top: 50px; font-size: 0.8em; color: #666;">
        <p>&copy; 2026 La Avenida de los Yankees - Desarrollado por Carlos Villa Ramos</p>
    </footer>

</body>
</html>
