<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia | La Avenida de los Yankees</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.8; color: #333; background: #f9f9f9; }
        .nav-post { background: #003087; padding: 10px; text-align: center; }
        .nav-post a { color: white; text-decoration: none; font-weight: bold; }
        .content-area { max-width: 700px; margin: 40px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #003087; border-bottom: 3px solid #E4002C; padding-bottom: 10px; text-transform: uppercase; }
        #post-texto img { max-width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body>

<div class="nav-post">
    <a href="index.html">← VOLVER A LA AVENIDA</a>
</div>

<div class="content-area">
    <h1 id="post-titulo">Cargando noticia...</h1>
    <div id="post-texto">
        <p>Buscando en los archivos del Bronx...</p>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get('file');

    async function cargarContenido() {
        if (!fileName) return;
        try {
            const url = `https://raw.githubusercontent.com/carlosvillaramos/La-avenida-de-los-Yankees/main/content/blog/${fileName}`;
            const res = await fetch(url);
            const textoRaw = await res.text();

            // Limpiar metadatos del CMS (frontmatter)
            const contenidoMarkdown = textoRaw.split('---').pop();
            
            document.getElementById('post-titulo').innerText = fileName.substring(11).replace(/-/g, ' ').replace('.md', '');
            document.getElementById('post-texto').innerHTML = marked.parse(contenidoMarkdown);
        } catch (e) {
            document.getElementById('post-titulo').innerText = "Error";
            document.getElementById('post-texto').innerHTML = "No se pudo cargar la noticia.";
        }
    }
    cargarContenido();
</script>

</body>
</html>
