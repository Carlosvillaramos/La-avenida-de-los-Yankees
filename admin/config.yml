backend:
  name: git-gateway
  branch: main # O 'master', depende de cómo se llame tu rama principal

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "noticias"
    label: "Noticias Yankees"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen de Portada", name: "image", widget: "image", required: false}
      - {label: "Cuerpo de la Noticia", name: "body", widget: "markdown"}